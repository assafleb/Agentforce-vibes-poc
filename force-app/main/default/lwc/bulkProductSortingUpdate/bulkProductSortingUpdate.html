<template>
    <lightning-card title="Bulk Product Sorting Order Update" icon-name="standard:product">
        <div class="slds-card__body slds-card__body_inner">
            
            <!-- File Upload Section -->
            <div class="slds-m-bottom_medium">
                <lightning-input
                    type="file"
                    label="Upload CSV File"
                    accept={acceptedFormats}
                    onchange={handleFileUpload}
                    disabled={isProcessing}>
                </lightning-input>
                
                <template if:true={isFileLoaded}>
                    <div class="slds-m-top_small">
                        <lightning-icon icon-name="doctype:csv" size="small" class="slds-m-right_x-small"></lightning-icon>
                        <span class="slds-text-body_regular">{fileName}</span>
                    </div>
                </template>
            </div>

            <!-- Activity Log -->
            <div class="slds-m-bottom_medium">
                <div class="slds-box activity-log-container">
                    <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                        <h3 class="slds-text-heading_small slds-grow">Activity Log</h3>
                        <template if:true={hasActivityLog}>
                            <lightning-button-icon
                                icon-name="utility:copy"
                                alternative-text="Copy to Clipboard"
                                title="Copy to Clipboard"
                                onclick={handleCopyToClipboard}
                                class="slds-m-left_x-small">
                            </lightning-button-icon>
                            <lightning-button-icon
                                icon-name="utility:clear"
                                alternative-text="Clear Log"
                                title="Clear Log"
                                onclick={handleClearLog}
                                class="slds-m-left_x-small">
                            </lightning-button-icon>
                        </template>
                    </div>
                    <template if:true={hasActivityLog}>
                        <div class="activity-log-content">
                            <template for:each={activityLog} for:item="logEntry">
                                <div key={logEntry.id} class="log-entry">{logEntry.message}</div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasActivityLog}>
                        <div class="slds-text-body_small slds-text-color_weak">
                            <p class="slds-m-bottom_x-small"><strong>Instructions:</strong></p>
                            <ul class="slds-list_dotted slds-m-left_medium">
                                <li>Upload a CSV file with columns "Product Key" and "Sorting Order"</li>
                                <li>Product Key must match existing Product2.Product_Key__c values</li>
                                <li>Click Apply to process the updates</li>
                                <li>Activity log will show detailed results here</li>
                            </ul>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="slds-m-bottom_medium">
                <lightning-button
                    variant="brand"
                    label="Apply"
                    onclick={handleApply}
                    disabled={isApplyDisabled}
                    class="slds-m-right_small">
                </lightning-button>
                
                <lightning-button
                    variant="neutral"
                    label="Reset"
                    onclick={handleReset}
                    disabled={isProcessing}>
                </lightning-button>
            </div>

            <!-- Progress Bar -->
            <template if:true={showProgressBar}>
                <div class="slds-m-bottom_medium">
                    <div class="slds-text-body_small slds-m-bottom_x-small">{statusMessage}</div>
                    <lightning-progress-bar value={progressValue}></lightning-progress-bar>
                </div>
            </template>

            <!-- Results Summary -->
            <template if:true={showResults}>
                <div class="slds-m-bottom_medium">
                    <div class="slds-box slds-theme_success">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">Processing Complete</h3>
                        <div class="slds-grid slds-wrap">
                            <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                <div class="slds-text-title">Total Records</div>
                                <div class="slds-text-heading_medium">{totalCount}</div>
                            </div>
                            <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                <div class="slds-text-title slds-text-color_success">Successful</div>
                                <div class="slds-text-heading_medium slds-text-color_success">{successCount}</div>
                            </div>
                            <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                <div class="slds-text-title slds-text-color_error">Failed</div>
                                <div class="slds-text-heading_medium slds-text-color_error">{failureCount}</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <template if:true={showDownloadButton}>
                    <div class="slds-m-bottom_medium">
                        <lightning-button
                            variant="success"
                            label="Download CSV"
                            icon-name="utility:download"
                            onclick={handleDownloadResults}
                            class="slds-m-right_x-small">
                        </lightning-button>
                        <lightning-button
                            variant="neutral"
                            label="Copy Results"
                            icon-name="utility:copy"
                            onclick={handleCopyToClipboard}>
                        </lightning-button>
                    </div>
                </template>
            </template>

        </div>
    </lightning-card>
</template>
